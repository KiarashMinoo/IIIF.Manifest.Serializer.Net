name: Publish NuGet Packages

on:
  push:
    branches:
      - 'release/v*.*.*'
  workflow_dispatch:
    inputs:
      channel:
        description: Package channel to publish
        type: choice
        required: true
        default: release
        options:
          - release
          - prerelease
      version-suffix:
        description: Optional version suffix for prerelease builds
        required: false
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: publish-nuget
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  pack:
    name: Build, Test, and Pack
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/release/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release branch and changelog
        shell: bash
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          if [[ ! "$branch" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "NuGet publishing is only allowed from release/v*.*.* branches. Current branch: $branch"
            exit 1
          fi

          version="${branch#release/}"
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md is required before publishing $version."
            exit 1
          fi

          if ! grep -q "## \[${version#v}\]" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a section for ${version#v} before publishing $version."
            exit 1
          fi

      - name: Create release tag when missing
        shell: bash
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          tag="${branch#release/}"

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists locally."
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$tag:refs/tags/$tag"
            echo "Tag $tag already exists on origin."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore IIIF.Manifest.Serializer.Net.slnx

      - name: Build (Release)
        run: dotnet build IIIF.Manifest.Serializer.Net.slnx --configuration Release --no-restore -p:GeneratePackageOnBuild=false

      - name: Test (Release)
        run: dotnet test tests/IIIF.Manifest.Serializer.Net.Tests/IIIF.Manifest.Serializer.Net.Tests.csproj --configuration Release --no-build

      - name: ArchTests (Release)
        run: dotnet test tests/IIIF.Manifest.Serializer.Net.ArchTests/IIIF.Manifest.Serializer.Net.ArchTests.csproj --configuration Release --no-build

      - name: Pack packages
        run: |
          mkdir -p ./artifacts/packages
          pack_args="--configuration Release --no-build --output ./artifacts/packages"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.channel }}" = "prerelease" ] && [ -n "${{ inputs.version-suffix }}" ]; then
            pack_args="$pack_args -p:VersionSuffix=${{ inputs.version-suffix }}"
          fi

          dotnet pack src/IIIF.Manifest.Serializer.Net/IIIF.Manifest.Serializer.Net.csproj $pack_args
          dotnet pack extensions/IIIF.Manifest.Serializer.Net.NavPlace/IIIF.Manifest.Serializer.Net.NavPlace.csproj $pack_args
          dotnet pack extensions/IIIF.Manifest.Serializer.Net.Georeference/IIIF.Manifest.Serializer.Net.Georeference.csproj $pack_args
          dotnet pack extensions/IIIF.Manifest.Serializer.Net.TextGranularity/IIIF.Manifest.Serializer.Net.TextGranularity.csproj $pack_args

      - name: Smoke test packages (issue #13)
        shell: pwsh
        run: ./scripts/smoke-test-packages.ps1 -SkipPack

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/packages/*
          if-no-files-found: error

  publish:
    name: Push to NuGet
    runs-on: ubuntu-latest
    needs: pack
    if: startsWith(github.ref, 'refs/heads/release/v')
    environment: release
    permissions:
      contents: read
      id-token: write # enable GitHub OIDC token issuance for NuGet Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/packages

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: NuGet login (OIDC to temp API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish packages to NuGet
        run: |
          for package in ./artifacts/packages/*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
