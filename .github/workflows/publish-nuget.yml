name: Publish NuGet Packages

# IIIF is release-only (no develop/beta channel) — every manual dispatch of this
# workflow finalizes a version, generates a CHANGELOG.md section, tags, creates a
# GitHub Release, builds, tests, packs, and publishes. Version is auto-incremented
# (patch++ only — see bump-component below) by reusable-ci.yml's shared
# update-version.ps1 script, same script ThunderPropagator's release channel uses — no
# manual version override input, to keep the process identical across repos.
on:
  workflow_dispatch: {}

concurrency:
  group: publish-nuget
  cancel-in-progress: false

jobs:
  # NuGet.org Trusted Publishing (OIDC) is built directly into reusable-ci.yml (it has
  # its own inline publish-nuget job) — this repo doesn't need its own. Set a repo
  # secret named NUGET_USER (Settings > Secrets and variables > Actions > Secrets) with
  # your nuget.org account name.
  #
  # IMPORTANT: a job-level `permissions:` block is exhaustive, not additive -- any
  # scope not listed here is implicitly set to "none" for every nested job the called
  # reusable workflow runs, regardless of what that nested job requests for itself.
  # This must list every scope ANY of reusable-ci.yml's jobs need across the whole run:
  # contents:write (version/changelog commit, tag, GitHub Release), packages:write +
  # id-token:write (publish-nuget, for GitHub Packages / NuGet.org OIDC respectively),
  # actions:write (cleanup-nuget-artifacts, to delete run artifacts).
  release:
    permissions:
      contents: write
      packages: write
      id-token: write
      actions: write
    uses: KiarashMinoo/.github/.github/workflows/reusable-ci.yml@main
    with:
      channel: release
      # IIIF only grows the patch version (e.g. 3.1.4 -> 3.1.5), instead of the default
      # major-bump-per-release-only-push protocol.
      bump-component: patch
      dotnet-versions: |
        10.0.x
      solution-path: 'IIIF.Manifest.Serializer.Net.slnx'
      platforms: '["AnyCpu"]'
      configurations: '["Release"]'
      # Directory.Build.props sets IsPackable=true globally, so a solution-wide pack
      # would also try (and fail/pollute artifacts) to pack the Tests/ArchTests/example
      # projects. List only the real package projects explicitly.
      pack-project-paths: |
        src/IIIF.Manifest.Serializer.Net/IIIF.Manifest.Serializer.Net.csproj
        extensions/IIIF.Manifest.Serializer.Net.NavPlace/IIIF.Manifest.Serializer.Net.NavPlace.csproj
        extensions/IIIF.Manifest.Serializer.Net.Georeference/IIIF.Manifest.Serializer.Net.Georeference.csproj
        extensions/IIIF.Manifest.Serializer.Net.TextGranularity/IIIF.Manifest.Serializer.Net.TextGranularity.csproj
      test-command: |
        dotnet test tests/IIIF.Manifest.Serializer.Net.Tests/IIIF.Manifest.Serializer.Net.Tests.csproj --configuration Release --no-build
        dotnet test tests/IIIF.Manifest.Serializer.Net.ArchTests/IIIF.Manifest.Serializer.Net.ArchTests.csproj --configuration Release --no-build
      # pack-solution.ps1 (used by reusable-ci.yml's Pack step) writes to artifacts/pkg, not
      # smoke-test-packages.ps1's own default (artifacts/packages) -- point it at the right dir.
      post-pack-command: pwsh ./scripts/smoke-test-packages.ps1 -SkipPack -PackagesDir artifacts/pkg
      publish-to-nuget: true
      nuget-target: 'nuget.org'
    secrets:
      gh-token: ${{ secrets.GITHUB_TOKEN }}
      nuget-user: 'yanis_1984'
