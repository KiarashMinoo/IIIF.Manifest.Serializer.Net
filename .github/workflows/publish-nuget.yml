name: Publish NuGet Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: New package version to release (e.g. 3.0.3, no leading "v"). Leave blank to auto-bump the patch part of the current version.
        required: false
        type: string
        default: ''
      channel:
        description: Package channel to publish
        type: choice
        required: true
        default: release
        options:
          - release
          - prerelease
      version-suffix:
        description: Optional version suffix for prerelease builds
        required: false
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: publish-nuget
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  release:
    name: Generate Changelog, Bump Version, Tag, and Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        shell: bash
        run: |
          input_version="${{ inputs.version }}"

          if [ -n "$input_version" ]; then
            version="$input_version"
          else
            current="$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props | head -1)"
            if [[ ! "$current" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Could not parse current version (X.Y.Z) from Directory.Build.props: $current"
              exit 1
            fi
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            version="$major.$minor.$((patch + 1))"
            echo "No version input given - auto-bumping $current -> $version"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must look like X.Y.Z (got: $version)"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/v$version" >/dev/null 2>&1; then
            echo "Tag v$version already exists on origin."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        shell: pwsh
        run: ./scripts/generate-changelog.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Bump package version
        shell: pwsh
        run: |
          $path = "Directory.Build.props"
          $updated = (Get-Content $path -Raw) -replace '<Version>[^<]+</Version>', "<Version>${{ steps.version.outputs.version }}</Version>"
          Set-Content -Path $path -Value $updated -NoNewline

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props
          git commit -m "Release v${{ steps.version.outputs.version }}: bump package version"
          git push origin "HEAD:${{ github.ref }}"

      - name: Create and push tag
        id: tag
        shell: bash
        run: |
          tag="v${{ steps.version.outputs.version }}"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        shell: bash
        run: gh release create "${{ steps.tag.outputs.tag }}" --title "${{ steps.tag.outputs.tag }}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pack:
    name: Build, Test, and Pack
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore IIIF.Manifest.Serializer.Net.slnx

      - name: Build (Release)
        run: dotnet build IIIF.Manifest.Serializer.Net.slnx --configuration Release --no-restore -p:GeneratePackageOnBuild=false

      - name: Test (Release)
        run: dotnet test tests/IIIF.Manifest.Serializer.Net.Tests/IIIF.Manifest.Serializer.Net.Tests.csproj --configuration Release --no-build

      - name: ArchTests (Release)
        run: dotnet test tests/IIIF.Manifest.Serializer.Net.ArchTests/IIIF.Manifest.Serializer.Net.ArchTests.csproj --configuration Release --no-build

      - name: Pack packages
        run: |
          mkdir -p ./artifacts/packages
          pack_args="--configuration Release --no-build --output ./artifacts/packages"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.channel }}" = "prerelease" ] && [ -n "${{ inputs.version-suffix }}" ]; then
            pack_args="$pack_args -p:VersionSuffix=${{ inputs.version-suffix }}"
          fi

          dotnet pack src/IIIF.Manifest.Serializer.Net/IIIF.Manifest.Serializer.Net.csproj $pack_args
          dotnet pack extensions/IIIF.Manifest.Serializer.Net.NavPlace/IIIF.Manifest.Serializer.Net.NavPlace.csproj $pack_args
          dotnet pack extensions/IIIF.Manifest.Serializer.Net.Georeference/IIIF.Manifest.Serializer.Net.Georeference.csproj $pack_args
          dotnet pack extensions/IIIF.Manifest.Serializer.Net.TextGranularity/IIIF.Manifest.Serializer.Net.TextGranularity.csproj $pack_args

      - name: Smoke test packages (issue #13)
        shell: pwsh
        run: ./scripts/smoke-test-packages.ps1 -SkipPack

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: ./artifacts/packages/*
          if-no-files-found: error

  publish:
    name: Push to NuGet
    runs-on: ubuntu-latest
    needs: [release, pack]
    environment: release
    permissions:
      contents: read
      id-token: write # enable GitHub OIDC token issuance for NuGet Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: ./artifacts/packages

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: NuGet login (OIDC to temp API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish packages to NuGet
        run: |
          for package in ./artifacts/packages/*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
