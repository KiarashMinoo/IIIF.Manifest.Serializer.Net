name: CI

on:
  push:
    branches:
      - develop
      - 'release/**'
  pull_request:
    branches:
      - develop
      - 'release/**'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore IIIF.Manifest.Serializer.Net.sln

      - name: Build
        run: dotnet build IIIF.Manifest.Serializer.Net.sln --configuration Release --no-restore -p:GeneratePackageOnBuild=false

      - name: Test
        run: dotnet test tests/IIIF.Manifest.Serializer.Net.Tests/IIIF.Manifest.Serializer.Net.Tests.csproj --configuration Release --no-build

      # Release strips PDBs (DebugSymbols=false, DebugType=None in Directory.Build.props), so
      # coverlet has nothing to instrument against a Release build - it silently reports 0%.
      # Coverage is measured against a separate Debug build instead.
      - name: Test with coverage (Debug)
        run: >
          dotnet test tests/IIIF.Manifest.Serializer.Net.Tests/IIIF.Manifest.Serializer.Net.Tests.csproj
          --configuration Debug
          --collect:"XPlat Code Coverage"
          --settings tests/IIIF.Manifest.Serializer.Net.Tests/coverlet.runsettings
          --results-directory ./coverage-raw

      - name: Generate coverage report
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.4.4
          reportgenerator \
            -reports:"coverage-raw/**/coverage.cobertura.xml" \
            -targetdir:coverage-report \
            -reporttypes:"MarkdownSummaryGithub;Cobertura"

      - name: Publish coverage summary
        if: always()
        run: |
          summary_file=$(find coverage-report -iname "*summary*github*.md" -print -quit)
          if [ -n "$summary_file" ]; then
            cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No coverage summary file found under coverage-report/." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

  publish-nuget:
    name: Build and publish NuGet packages
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore IIIF.Manifest.Serializer.Net.sln

      - name: Build
        run: dotnet build IIIF.Manifest.Serializer.Net.sln --configuration Release --no-restore -p:GeneratePackageOnBuild=false

      - name: Test
        run: dotnet test tests/IIIF.Manifest.Serializer.Net.Tests/IIIF.Manifest.Serializer.Net.Tests.csproj --configuration Release --no-build

      - name: Pack NuGet packages
        run: |
          dotnet pack src/IIIF.Manifest.Serializer.Net/IIIF.Manifest.Serializer.Net.csproj --configuration Release --no-build --output ./artifacts/packages
          dotnet pack extensions/IIIF.Manifest.Serializer.Net.NavPlace/IIIF.Manifest.Serializer.Net.NavPlace.csproj --configuration Release --no-build --output ./artifacts/packages
          dotnet pack extensions/IIIF.Manifest.Serializer.Net.Georeference/IIIF.Manifest.Serializer.Net.Georeference.csproj --configuration Release --no-build --output ./artifacts/packages
          dotnet pack extensions/IIIF.Manifest.Serializer.Net.TextGranularity/IIIF.Manifest.Serializer.Net.TextGranularity.csproj --configuration Release --no-build --output ./artifacts/packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/packages/*.nupkg

      - name: Publish packages to NuGet
        run: |
          for package in ./artifacts/packages/*.nupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

