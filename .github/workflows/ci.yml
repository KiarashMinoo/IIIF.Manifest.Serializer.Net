name: CI

on:
  push:
    branches:
      - develop
      - 'release/**'
  pull_request:
    branches:
      - develop
      - 'release/**'
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write
  packages: write

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore IIIF.Manifest.Serializer.Net.sln

      - name: Build
        run: dotnet build IIIF.Manifest.Serializer.Net.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/IIIF.Manifest.Serializer.Net.Tests/IIIF.Manifest.Serializer.Net.Tests.csproj --configuration Release --no-build

  beta-ci:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/develop'
    uses: KiarashMinoo/.github/.github/workflows/reusable-beta-ci.yml@main
    with:
      solution-path: 'IIIF.Manifest.Serializer.Net.sln'
    secrets:
      gh-token: ${{ secrets.GH_TOKEN }}
      nuget-api-key: ${{ secrets.NUGET_API_KEY }}

  release-ci:
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/heads/release/')
    uses: KiarashMinoo/.github/.github/workflows/reusable-release-ci.yml@main
    with:
      solution-path: 'IIIF.Manifest.Serializer.Net.sln'
    secrets:
      gh-token: ${{ secrets.GH_TOKEN }}
      nuget-api-key: ${{ secrets.NUGET_API_KEY }}
