name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:
    branches:
      - '**'
  merge_group: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  validate:
    name: Build, Test, and Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore IIIF.Manifest.Serializer.Net.slnx

      - name: Build (Release)
        run: dotnet build IIIF.Manifest.Serializer.Net.slnx --configuration Release --no-restore -p:GeneratePackageOnBuild=false

      - name: Test (Release)
        run: dotnet test tests/IIIF.Manifest.Serializer.Net.Tests/IIIF.Manifest.Serializer.Net.Tests.csproj --configuration Release --no-build

      - name: ArchTests (Release)
        run: dotnet test tests/IIIF.Manifest.Serializer.Net.ArchTests/IIIF.Manifest.Serializer.Net.ArchTests.csproj --configuration Release --no-build

      # Release strips PDBs (DebugSymbols=false, DebugType=None in Directory.Build.props), so
      # coverlet has nothing to instrument against a Release build. Coverage is measured in Debug.
      - name: Test with coverage (Debug)
        run: >
          dotnet test tests/IIIF.Manifest.Serializer.Net.Tests/IIIF.Manifest.Serializer.Net.Tests.csproj
          --configuration Debug
          --collect:"XPlat Code Coverage"
          --settings tests/IIIF.Manifest.Serializer.Net.Tests/coverlet.runsettings
          --results-directory ./coverage-raw

      - name: Generate coverage report
        if: success()
        run: |
          dotnet tool update --global dotnet-reportgenerator-globaltool --version 5.4.4
          reportgenerator \
            -reports:"coverage-raw/**/coverage.cobertura.xml" \
            -targetdir:coverage-report \
            -reporttypes:"MarkdownSummaryGithub;Cobertura"

      - name: Publish coverage summary
        if: always()
        run: |
          summary_file=$(find coverage-report -iname "*summary*github*.md" -print -quit)
          if [ -n "$summary_file" ]; then
            cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No coverage summary file found under coverage-report/." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report
          if-no-files-found: warn
