name: DAST - Dynamic Application Security Testing

# IIIF.Manifest.Serializer.Net is a NuGet library with no built-in HTTP server.
# DAST must be triggered manually against an external application that consumes the library.
on:
  workflow_dispatch:
    inputs:
      target-url:
        description: 'Base URL of the running application to scan (required, e.g. https://staging.example.com)'
        type: string
        required: true
      scan-type:
        description: 'ZAP scan mode'
        type: choice
        options:
          - baseline
          - full
          - api
        default: baseline
      openapi-url:
        description: 'OpenAPI / Swagger spec URL (required when scan-type is api)'
        type: string
        required: false
        default: ''
      fail-on-alerts:
        description: Fail the workflow when ZAP reports alerts
        type: boolean
        default: false
      artifact-retention-days:
        description: Number of days to retain the ZAP HTML report artifact
        type: number
        default: 30

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  dast:
    uses: KiarashMinoo/.github/.github/workflows/reusable-dast.yml@main
    with:
      target-url: ${{ inputs.target-url }}
      scan-type: ${{ inputs.scan-type }}
      openapi-url: ${{ inputs.openapi-url }}
      fail-on-alerts: ${{ inputs.fail-on-alerts }}
      artifact-retention-days: ${{ inputs.artifact-retention-days }}
    secrets:
      gh-token: ${{ secrets.GH_TOKEN }}
