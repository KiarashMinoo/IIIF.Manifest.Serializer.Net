name: DAST - Dynamic Application Security Testing

# IIIF.Manifest.Serializer.Net is a NuGet library with no built-in HTTP server.
# DAST must be triggered manually against an external application that consumes the library.
on:
  workflow_dispatch:
    inputs:
      target-url:
        description: 'Base URL of the running application to scan (required, e.g. https://staging.example.com)'
        type: string
        required: true
      scan-type:
        description: 'ZAP scan mode'
        type: choice
        options:
          - baseline
          - full
          - api
        default: baseline
      openapi-url:
        description: 'OpenAPI / Swagger spec URL (required when scan-type is api)'
        type: string
        required: false
        default: ''
      fail-on-alerts:
        description: Fail the workflow when ZAP reports alerts
        type: boolean
        default: false
      artifact-retention-days:
        description: Number of days to retain the ZAP HTML report artifact
        type: number
        default: 30

permissions:
  contents: read
  issues: write
  security-events: write

concurrency:
  group: dast-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate required inputs
        shell: bash
        run: |
          set -euo pipefail

          target_url='${{ inputs.target-url }}'
          scan_type='${{ inputs.scan-type }}'
          openapi_url='${{ inputs.openapi-url }}'

          if [ -z "$target_url" ]; then
            echo "target-url is required."
            exit 1
          fi

          if [[ ! "$target_url" =~ ^https?:// ]]; then
            echo "target-url must start with http:// or https://"
            exit 1
          fi

          if [ "$scan_type" = "api" ] && [ -z "$openapi_url" ]; then
            echo "openapi-url is required when scan-type is api."
            exit 1
          fi

          if [ -n "$openapi_url" ] && [[ ! "$openapi_url" =~ ^https?:// ]]; then
            echo "openapi-url must start with http:// or https://"
            exit 1
          fi

  dast:
    needs: preflight
    uses: KiarashMinoo/.github/.github/workflows/reusable-dast.yml@main
    with:
      target-url: ${{ inputs.target-url }}
      scan-type: ${{ inputs.scan-type }}
      openapi-url: ${{ inputs.openapi-url }}
      fail-on-alerts: ${{ inputs.fail-on-alerts }}
      artifact-retention-days: ${{ inputs.artifact-retention-days }}
    secrets:
      gh-token: ${{ secrets.GITHUB_TOKEN }}
