name: SAST - Static Analysis Security Testing

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      enable-codeql:
        description: Run CodeQL analysis
        type: boolean
        default: true
      fail-on-findings:
        description: Fail if any security findings are detected
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: sast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sast:
    uses: KiarashMinoo/.github/.github/workflows/reusable-sast.yml@main
    with:
      languages: '["csharp"]'
      dotnet-versions: |
        10.0.x
      solution-path: 'IIIF.Manifest.Serializer.Net.slnx'
      enable-codeql: ${{ github.event_name != 'workflow_dispatch' || inputs.enable-codeql }}
      codeql-queries: 'security-extended,security-and-quality'
      fail-on-findings: ${{ github.event_name == 'workflow_dispatch' && inputs.fail-on-findings }}
    secrets:
      gh-token: ${{ secrets.GH_TOKEN }}

  pr-security-gate:
    name: PR Security Gate (High/Critical)
    if: github.event_name == 'pull_request'
    needs: sast
    runs-on: ubuntu-latest
    permissions:
      security-events: read
      contents: read
    steps:
      - name: Fail PR on open high/critical code-scanning alerts
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const alerts = await github.paginate(
              github.rest.codeScanning.listAlertsForRepo,
              {
                owner,
                repo,
                state: 'open',
                pr: prNumber,
                per_page: 100
              }
            );

            const blocking = alerts.filter(a => {
              const sev = (a.rule?.security_severity_level || '').toLowerCase();
              return sev === 'high' || sev === 'critical';
            });

            if (blocking.length > 0) {
              core.error(`Blocking PR: found ${blocking.length} open high/critical code-scanning alert(s).`);
              for (const alert of blocking) {
                core.error(`- [${alert.number}] ${alert.rule?.id || 'unknown-rule'} (${alert.rule?.security_severity_level || 'unknown'})`);
              }
              core.setFailed('PR blocked by SAST high/critical findings.');
            } else {
              core.info('No open high/critical code-scanning alerts for this PR.');
            }
