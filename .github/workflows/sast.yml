name: SAST - Static Analysis Security Testing

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      enable-codeql:
        description: Run CodeQL analysis
        type: boolean
        default: true
      fail-on-findings:
        description: Fail if any security findings are detected
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: sast-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  sast:
    uses: KiarashMinoo/.github/.github/workflows/reusable-sast.yml@main
    with:
      languages: '["csharp"]'
      codeql-queries: 'security-extended,security-and-quality'
      codeql-build-mode: 'manual'
      enable-codeql: ${{ github.event_name == 'workflow_dispatch' && inputs.enable-codeql || true }}
      enable-devskim: true
      enable-secret-scan: true
      enable-pr-gate: true
      fail-on-findings: ${{ github.event_name == 'workflow_dispatch' && inputs.fail-on-findings || false }}
    secrets:
      gh-token: ${{ secrets.GITHUB_TOKEN }}
