name: SAST - Static Analysis Security Testing

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      enable-codeql:
        description: Run CodeQL analysis
        type: boolean
        default: true
      fail-on-findings:
        description: Fail if any security findings are detected
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: sast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sast:
    uses: KiarashMinoo/.github/.github/workflows/reusable-sast.yml@main
    with:
      languages: '["csharp"]'
      dotnet-versions: |
        8.0.x
      solution-path: 'IIIF.Manifest.Serializer.Net.slnx'
      enable-codeql: ${{ github.event_name != 'workflow_dispatch' || inputs.enable-codeql }}
      codeql-queries: 'security-extended,security-and-quality'
      fail-on-findings: ${{ github.event_name == 'workflow_dispatch' && inputs.fail-on-findings }}
    secrets:
      gh-token: ${{ secrets.GH_TOKEN }}
