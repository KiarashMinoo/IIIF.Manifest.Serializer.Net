name: SAST - Static Analysis Security Testing

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      enable-codeql:
        description: Run CodeQL analysis
        type: boolean
        default: true
      enable-semgrep:
        description: Run Semgrep SAST
        type: boolean
        default: true
      enable-gitleaks:
        description: Run Gitleaks secret scanning
        type: boolean
        default: true
      fail-on-findings:
        description: Fail if any security findings are detected
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  sast:
    uses: KiarashMinoo/.github/.github/workflows/reusable-sast.yml@main
    with:
      languages: '["csharp"]'
      dotnet-versions: |
        8.0.x
        9.0.x
        10.0.x
      solution-path: 'IIIF.Manifest.Serializer.Net.sln'
      enable-codeql: ${{ github.event_name != 'workflow_dispatch' || inputs.enable-codeql }}
      enable-semgrep: ${{ github.event_name != 'workflow_dispatch' || inputs.enable-semgrep }}
      enable-gitleaks: ${{ github.event_name != 'workflow_dispatch' || inputs.enable-gitleaks }}
      semgrep-config: 'p/csharp'
      codeql-queries: 'security-extended,security-and-quality'
      fail-on-findings: ${{ github.event_name == 'workflow_dispatch' && inputs.fail-on-findings }}
    secrets:
      gh-token: ${{ secrets.GH_TOKEN }}
      semgrep-app-token: ${{ secrets.SEMGREP_APP_TOKEN }}
