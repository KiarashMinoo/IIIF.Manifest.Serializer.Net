name: SAST - Static Analysis Security Testing

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      enable-codeql:
        description: Run CodeQL analysis
        type: boolean
        default: true
      fail-on-findings:
        description: Fail if any security findings are detected
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: sast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scanning:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  codeql:
    name: CodeQL (csharp)
    if: github.event_name != 'workflow_dispatch' || inputs.enable-codeql
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-extended,security-and-quality
          build-mode: manual

      - name: Restore
        run: dotnet restore IIIF.Manifest.Serializer.Net.slnx

      - name: Build
        run: dotnet build IIIF.Manifest.Serializer.Net.slnx --configuration Release --no-restore -p:GeneratePackageOnBuild=false

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  pr-security-gate:
    name: PR Security Gate (High/Critical)
    if: github.event_name == 'pull_request'
    needs: codeql
    runs-on: ubuntu-latest
    permissions:
      security-events: read
      contents: read
    steps:
      - name: Fail PR on open high/critical code-scanning alerts
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function getAlerts() {
              return github.paginate(github.rest.codeScanning.listAlertsForRepo, {
                owner,
                repo,
                state: 'open',
                pr: prNumber,
                per_page: 100
              });
            }

            let alerts;
            for (let attempt = 1; attempt <= 6; attempt++) {
              try {
                alerts = await getAlerts();
                break;
              } catch (error) {
                const noAnalysis = error.status === 404 && String(error.message || '').toLowerCase().includes('no analysis found');
                if (!noAnalysis) {
                  throw error;
                }

                if (attempt === 6) {
                  core.setFailed('Code scanning analysis was not available after waiting for upload propagation.');
                  return;
                }

                core.warning(`Code scanning results not ready yet (attempt ${attempt}/6). Retrying in 10 seconds.`);
                await new Promise(resolve => setTimeout(resolve, 10_000));
              }
            }

            const blocking = alerts.filter(a => {
              const sev = (a.rule?.security_severity_level || '').toLowerCase();
              return sev === 'high' || sev === 'critical';
            });

            if (blocking.length > 0) {
              core.error(`Blocking PR: found ${blocking.length} open high/critical code-scanning alert(s).`);
              for (const alert of blocking) {
                core.error(`- [${alert.number}] ${alert.rule?.id || 'unknown-rule'} (${alert.rule?.security_severity_level || 'unknown'})`);
              }
              core.setFailed('PR blocked by SAST high/critical findings.');
            } else {
              core.info('No open high/critical code-scanning alerts for this PR.');
            }
