name: Patch Management - Dependency Vulnerability and Update Audit

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
    paths:
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '**/Directory.Build.props'
      - '**/Directory.Packages.props'
      - '**/*.csproj'
      - '**/*.sln'
      - 'global.json'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
    paths:
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '**/Directory.Build.props'
      - '**/Directory.Packages.props'
      - '**/*.csproj'
      - '**/*.sln'
      - 'global.json'
  schedule:
    - cron: '0 8 * * 2'
  workflow_dispatch:
    inputs:
      fail-on-vulnerable:
        description: Fail when packages with known CVEs are found
        type: boolean
        default: true
      fail-on-outdated:
        description: Fail when packages with available updates are found
        type: boolean
        default: false
      create-issue:
        description: Open a GitHub issue summarizing findings
        type: boolean
        default: true
      owasp-fail-cvss:
        description: CVSS score threshold at which OWASP DC fails the build (0-10)
        type: number
        default: 7

permissions:
  contents: read
  issues: write
  security-events: write

concurrency:
  group: patch-management-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch-management:
    uses: KiarashMinoo/.github/.github/workflows/reusable-patch-management.yml@main
    with:
      dotnet-versions: |
        8.0.x
        10.0.x
      solution-path: 'IIIF.Manifest.Serializer.Net.sln'
      fail-on-vulnerable: ${{ github.event_name != 'workflow_dispatch' || inputs.fail-on-vulnerable }}
      fail-on-outdated: ${{ github.event_name == 'workflow_dispatch' && inputs.fail-on-outdated }}
      create-issue: ${{ github.event_name != 'workflow_dispatch' || inputs.create-issue }}
      owasp-fail-cvss: ${{ github.event_name == 'workflow_dispatch' && inputs.owasp-fail-cvss || 7 }}
      owasp-suppression-file: 'owasp-suppression.xml'
    secrets:
      gh-token: ${{ secrets.GH_TOKEN }}
      nvd-api-key: ${{ secrets.NVD_API_KEY }}

